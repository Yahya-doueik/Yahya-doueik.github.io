<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub AI Chat</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; } 
        .chat-container { width: 400px; height: 600px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); } 
        header { padding: 15px; background: #21262d; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; } 
        header h2 { margin: 0; font-size: 16px; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; } 
        .message { padding: 8px 12px; border-radius: 15px; max-width: 80%; line-height: 1.4; font-size: 14px; word-wrap: break-word; } 
        .user { align-self: flex-end; background: #238636; color: white; border-bottom-right-radius: 2px; } 
        .bot { align-self: flex-start; background: #30363d; color: white; border-bottom-left-radius: 2px; } 
        .input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #30363d; } 
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; outline: none; } 
        button { padding: 10px 15px; border: none; border-radius: 5px; background: #238636; color: white; cursor: pointer; font-weight: bold; } 
        button:hover { background: #2ea043; }
        #settings-btn { background: transparent; border: 1px solid #30363d; font-size: 12px; padding: 5px 10px; }
    </style>
</head>
<body>

<div class="chat-container">
    <header>
        <h2>GitHub AI Chat</h2>
        <button id="settings-btn">Set PAT</button>
    </header>
    <div id="chat-box">
        <div class="message bot">Click 'Set PAT' to add your GitHub Token, then start chatting!</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const settingsBtn = document.getElementById('settings-btn');

    let GITHUB_PAT = localStorage.getItem('github_pat') || "";

    settingsBtn.onclick = () => {
        const key = prompt("Enter your GitHub PAT (with models:read permission):", GITHUB_PAT);
        if (key) {
            GITHUB_PAT = key;
            localStorage.setItem('github_pat', key);
            addMessage("PAT Updated successfully!", "bot");
        }
    };

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;
        if (!GITHUB_PAT) return alert("Please set your GitHub PAT first using the button at the top.");

        addMessage(text, 'user');
        userInput.value = "";

        // Add a temporary "typing" indicator
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message bot';
        loadingDiv.innerText = "...";
        chatBox.appendChild(loadingDiv);

        try {
            const response = await fetch("https://azure.com", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${GITHUB_PAT}`
                },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "You are a helpful assistant." },
                        { role: "user", content: text }
                    ],
                    model: "gpt-4o-mini",
                    max_tokens: 500
                })
            });

            const data = await response.json();
            chatBox.removeChild(loadingDiv); // Remove loading dots

            if (data.choices && data.choices[0]) {
                const botReply = data.choices[0].message.content;
                addMessage(botReply, 'bot');
            } else {
                throw new Error("Invalid response");
            }
        } catch (error) {
            if(chatBox.contains(loadingDiv)) chatBox.removeChild(loadingDiv);
            addMessage("Error: Could not reach the model. Check your PAT and permissions.", 'bot');
            console.error(error);
        }
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    sendBtn.onclick = sendMessage;
    userInput.onkeypress = (e) => { if (e.key === "Enter") sendMessage(); };
</script>

</body>
</html>
